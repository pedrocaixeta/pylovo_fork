# set number of clusters
N_CLUSTERS_KMEDOID: 5
N_CLUSTERS_KMEANS: 7
N_CLUSTERS_GMM: 7  # refers to gmm tied

# set threshold values
THRESHOLD_MAX_TRAFO_DIS: 2.5  # cables between trafo and house connection too long
