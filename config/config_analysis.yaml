# =============================================================================
# ANALYSIS AND PLOTTING CONFIGURATION
# =============================================================================
# This file contains settings for grid analysis, plotting, and municipal register

# =============================================================================
# PLOTTING CONFIGURATION
# =============================================================================
# Color mapping for different transformer sizes in plots
PLOT_COLOR_DICT:
  100: gold
  160: orange
  200: darkorange
  250: peru
  315: orangered
  400: red
  515: crimson
  500: crimson
  630: purple
  715: blue
  800: darkblue
  1260: black

# =============================================================================
# PLOTTING CONFIGURATION
# =============================================================================

# =============================================================================
# TUM COLOR PALETTE
# =============================================================================
COLORS:
  # Primary TUM Colors
  TUMBlue: '#0065BD'
  TUMGreen: '#A2AD00'
  TUMOrange: '#E37222'
  TUMIvory: '#DAD7CB'

  # Secondary TUM Colors
  TUMBlue4: '#98C6EA'
  TUMBlue2: '#005293'
  TUMGray2: '#7F7F7F'

# =============================================================================
# COLOR PALETTES
# =============================================================================
PALETTES:
  # Standard palette (6 colors)
  TUMPalette:
    - '#0065BD'  # TUMBlue
    - '#A2AD00'  # TUMGreen
    - '#E37222'  # TUMOrange
    - '#98C6EA'  # TUMBlue4
    - '#7F7F7F'  # TUMGray2
    - '#005293'  # TUMBlue2

  # Extended palette with ivory (7 colors)
  TUMPalette1:
    - '#0065BD'  # TUMBlue
    - '#A2AD00'  # TUMGreen
    - '#E37222'  # TUMOrange
    - '#DAD7CB'  # TUMIvory
    - '#98C6EA'  # TUMBlue4
    - '#005293'  # TUMBlue2
    - '#7F7F7F'  # TUMGray2

  # Alternative palette (6 colors)
  TUMPalette2:
    - '#0065BD'  # TUMBlue
    - '#A2AD00'  # TUMGreen
    - '#E37222'  # TUMOrange
    - '#98C6EA'  # TUMBlue4
    - '#005293'  # TUMBlue2
    - '#7F7F7F'  # TUMGray2

  # Minimal palette (3 colors)
  TUMPalette3:
    - '#0065BD'  # TUMBlue
    - '#A2AD00'  # TUMGreen
    - '#E37222'  # TUMOrange

# =============================================================================
# NETWORK VISUALIZATION COLORS
# =============================================================================
NETWORK_COLORS:
  NODE_COLOR_TRAFO: '#DAD7CB'      # TUMIvory
  NODE_COLOR_CONSUMER: '#98C6EA'   # TUMBlue4
  NODE_COLOR_CONNECTION_BUS: '#A2AD00'  # TUMGreen

# =============================================================================
# PLOT STYLE DEFAULTS
# =============================================================================
PLOT_DEFAULTS:
  FIGURE_SIZE: [12, 6]
  DPI: 300
  FONT_SIZE: 12
  TITLE_FONT_SIZE: 14
  GRID_ALPHA: 0.3

# =============================================================================
# MUNICIPAL REGISTER CONFIGURATION
# =============================================================================
# Define the columns that should be included in the municipal register
# These columns are used for regional data analysis and grid generation
MUNICIPAL_REGISTER:
  - plz
  - pop
  - area
  - lat
  - lon
  - ags
  - name_city
  - fed_state
  - regio7
  - regio5
  - pop_den
