USE_INFDB: True # If True ensure that you have the connection details in your .env file. Template is below.
PARALLEL: True # Toggles whether the grid generation uses multiple workers in parallel
N_JOBS_PERCENT: 60  # Percentage of CPU cores to use for parallel grid generation
ANALYZE_GRIDS: True # Toggles analysis after grid generation (basic parameters, trafo analysis, cable counting)
SAVE_GRID_FOLDER: False # Toggles whether the grid json files will be saved in a folder or just in the db
LOG_LEVEL: INFO #DEBUG, INFO, ERROR - Logging configurations

# // .env
# INFDB_DBNAME='citydb'
# INFDB_USER='citydb_user'
# INFDB_HOST='00.000.00.00'
# INFDB_PORT=5432
# INFDB_PASSWORD='citydb_password'

# Default pylovo database connection configuration if no .env file is found
DBNAME: pylovo_db_local
USER: postgres
HOST: localhost
PORT: 5432
PASSWORD: postgres
TARGET_SCHEMA: public

## Default infdb connection configuration if no .env file is found
INFDB_DBNAME: citydb
INFDB_USER: citydb_user
INFDB_HOST: localhost
INFDB_PORT: 5432
INFDB_PASSWORD: citydb_password
INFDB_SOURCE_SCHEMA: public

# Seed for the initialization of the k-means clustering for transformer placement
# Keeping the same seed ensures consistent behavior in multiple runs
# Has to be an integer between 0 and 4294967295
K_MEANS_SEED: 3329829316

MUNICIPAL_REGISTER:
  - plz
  - pop
  - area
  - lat
  - lon
  - ags
  - name_city
  - fed_state
  - regio7
  - regio5
  - pop_den