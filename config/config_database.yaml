# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================

# Set to True if you want to use the InfDB database for building data
USE_INFDB: True  # ensure that you have the connection details in your .env file as shown below

# It is recommended to use a .env file for sensitive database credentials
# SETUP PROCESS:
# 1. Create a .env file in the project root directory
# 2. Copy one of the examples below to your .env file
# 3. Update the values with your actual database credentials
# 4. The .env file will override the default values below

# =============================================================================
# EXAMPLE 1: With InfDB Database
# =============================================================================
# Copy this to your .env file if using InfDB:

# # PYLOVO Database
# HOST="<infdb_host>"
# PORT="<infdb_port>"
# DBNAME="infdb"
# DBUSER="infdb_user"
# PASSWORD="<infdb_password>"
# TARGET_SCHEMA="pylovo"
# INFDB_SOURCE_SCHEMA="basedata"

# =============================================================================
# EXAMPLE 2: Local PostgreSQL Database
# =============================================================================
# Copy this to your .env file for local development:

# # PYLOVO Database
# DBNAME="pylovo"
# DBUSER="postgres"
# HOST="localhost"
# PORT="5432"
# PASSWORD="pylovo_password"
# TARGET_SCHEMA="public"
