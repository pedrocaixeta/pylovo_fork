# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
# This file contains database connection settings for Pylovo
# 
# IMPORTANT: It is strongly recommended to use a .env file for sensitive 
# database credentials instead of storing them directly in this config file.
# 
# To use .env file:
# 1. Create a .env file in the project root
# 2. Add your database credentials to the .env file
# 3. The .env file will override the default values below
#
# Example .env file content:
# # PYLOVO Database
# DBNAME=your_pylovo_db
# DBUSER=your_username
# HOST=localhost
# PORT=5432
# PASSWORD=your_password
# TARGET_SCHEMA=pylovo
#
# # InfDB Database (if using InfDB)
# INFDB_DBNAME=citydb
# INFDB_USER=citydb_user
# INFDB_HOST=localhost
# INFDB_PORT=5432
# INFDB_PASSWORD=citydb_password
# INFDB_SOURCE_SCHEMA=public

# =============================================================================
# INFDB CONFIGURATION
# =============================================================================
# Set to True if you want to use the InfDB database for building data
# If True, ensure that you have the connection details in your .env file
USE_INFDB: True

# =============================================================================
# PYLOVO DATABASE CONFIGURATION
# =============================================================================
# Default pylovo database connection configuration
# These values will be overridden by .env file if present
# DBNAME: postgres
# DBUSER: postgres
# HOST: localhost
# PORT: 5432
# PASSWORD: postgres
# TARGET_SCHEMA: pylovo

# # PYLOVO database
# DBNAME: citydb
# DBUSER: citydb_user
# HOST: host
# PORT: port
# PASSWORD: pw
# TARGET_SCHEMA: pylovo

# =============================================================================
# INFDB DATABASE CONFIGURATION
# =============================================================================
# Default InfDB connection configuration
# These values will be overridden by .env file if present
INFDB_DBNAME: citydb
INFDB_USER: citydb_user
INFDB_HOST: 10.162.28.165
INFDB_PORT: 54322
INFDB_PASSWORD: infdb
INFDB_SOURCE_SCHEMA: public
